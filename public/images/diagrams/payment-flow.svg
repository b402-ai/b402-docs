<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" fill="none">
  <defs>
    <style>
      text { font-family: 'Helvetica Neue', Arial, sans-serif; }
      .label { font-size: 14px; fill: #F4B526; font-weight: 600; }
      .sublabel { font-size: 11px; fill: #999; }
      .step { font-size: 12px; fill: #fff; }
      .arrow { stroke: #F4B526; stroke-width: 1.5; fill: none; marker-end: url(#arrowGold); }
      .arrow-back { stroke: #666; stroke-width: 1.5; fill: none; marker-end: url(#arrowGray); stroke-dasharray: 6 3; }
      .note { font-size: 11px; fill: #F4B526; font-style: italic; }
    </style>
    <marker id="arrowGold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#F4B526"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#666"/>
    </marker>
  </defs>

  <rect width="900" height="520" rx="12" fill="#0D0D0D"/>
  <rect x="0" y="0" width="900" height="520" rx="12" fill="none" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Column headers -->
  <rect x="80" y="20" width="120" height="36" rx="6" fill="#1a1a1a" stroke="#F4B526" stroke-width="1"/>
  <text x="140" y="43" text-anchor="middle" class="label">Client (Agent)</text>

  <rect x="310" y="20" width="120" height="36" rx="6" fill="#1a1a1a" stroke="#F4B526" stroke-width="1"/>
  <text x="370" y="43" text-anchor="middle" class="label">Server</text>

  <rect x="540" y="20" width="120" height="36" rx="6" fill="#1a1a1a" stroke="#F4B526" stroke-width="1"/>
  <text x="600" y="43" text-anchor="middle" class="label">Facilitator</text>

  <rect x="740" y="20" width="120" height="36" rx="6" fill="#1a1a1a" stroke="#F4B526" stroke-width="1"/>
  <text x="800" y="43" text-anchor="middle" class="label">Blockchain</text>

  <!-- Vertical lines -->
  <line x1="140" y1="56" x2="140" y2="500" stroke="#333" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="370" y1="56" x2="370" y2="500" stroke="#333" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="600" y1="56" x2="600" y2="500" stroke="#333" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="800" y1="56" x2="800" y2="500" stroke="#333" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Step 1: GET /resource -->
  <line x1="140" y1="90" x2="370" y2="90" class="arrow"/>
  <text x="255" y="83" text-anchor="middle" class="step">GET /resource</text>

  <!-- Step 2: 402 response -->
  <line x1="370" y1="130" x2="140" y2="130" class="arrow-back"/>
  <text x="255" y="123" text-anchor="middle" class="step">402 + payment requirements</text>

  <!-- Step 3: Sign -->
  <rect x="90" y="155" width="100" height="30" rx="4" fill="#1a1a1a" stroke="#F4B526" stroke-width="0.5"/>
  <text x="140" y="174" text-anchor="middle" class="note">Sign EIP-712</text>

  <!-- Step 4: Retry with payment -->
  <line x1="140" y1="210" x2="370" y2="210" class="arrow"/>
  <text x="255" y="203" text-anchor="middle" class="step">GET /resource + X-PAYMENT</text>

  <!-- Step 5: Verify -->
  <line x1="370" y1="260" x2="600" y2="260" class="arrow"/>
  <text x="485" y="253" text-anchor="middle" class="step">POST /verify</text>

  <!-- Step 6: Valid -->
  <line x1="600" y1="295" x2="370" y2="295" class="arrow-back"/>
  <text x="485" y="288" text-anchor="middle" class="step">{ isValid, payer }</text>

  <!-- Step 7: Settle -->
  <line x1="370" y1="340" x2="600" y2="340" class="arrow"/>
  <text x="485" y="333" text-anchor="middle" class="step">POST /settle</text>

  <!-- Step 8: On-chain -->
  <line x1="600" y1="375" x2="800" y2="375" class="arrow"/>
  <text x="700" y="368" text-anchor="middle" class="step">transferWithAuthorization()</text>

  <!-- Step 9: Receipt -->
  <line x1="800" y1="405" x2="600" y2="405" class="arrow-back"/>
  <text x="700" y="398" text-anchor="middle" class="step">tx receipt</text>

  <!-- Step 10: Success -->
  <line x1="600" y1="440" x2="370" y2="440" class="arrow-back"/>
  <text x="485" y="433" text-anchor="middle" class="step">{ success, txHash }</text>

  <!-- Step 11: Response -->
  <line x1="370" y1="475" x2="140" y2="475" class="arrow-back"/>
  <text x="255" y="468" text-anchor="middle" class="step">200 + resource</text>
</svg>