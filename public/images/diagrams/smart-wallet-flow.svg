<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 480" fill="none">
  <defs>
    <style>
      text { font-family: 'Helvetica Neue', Arial, sans-serif; }
      .label { font-size: 14px; fill: #F4B526; font-weight: 600; }
      .step { font-size: 12px; fill: #fff; }
      .detail { font-size: 10px; fill: #888; }
      .note { font-size: 11px; fill: #F4B526; font-style: italic; }
      .arrow { stroke: #F4B526; stroke-width: 1.5; fill: none; marker-end: url(#arrowGold); }
      .arrow-back { stroke: #666; stroke-width: 1.5; fill: none; marker-end: url(#arrowGray); stroke-dasharray: 6 3; }
    </style>
    <marker id="arrowGold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#F4B526"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#666"/>
    </marker>
  </defs>

  <rect width="850" height="480" rx="12" fill="#0D0D0D"/>

  <!-- Column headers -->
  <rect x="70" y="20" width="110" height="36" rx="6" fill="#1a1a1a" stroke="#F4B526" stroke-width="1"/>
  <text x="125" y="43" text-anchor="middle" class="label">Client</text>

  <rect x="340" y="20" width="130" height="36" rx="6" fill="#1a1a1a" stroke="#F4B526" stroke-width="1"/>
  <text x="405" y="43" text-anchor="middle" class="label">Facilitator</text>

  <rect x="620" y="20" width="150" height="36" rx="6" fill="#1a1a1a" stroke="#F4B526" stroke-width="1"/>
  <text x="695" y="43" text-anchor="middle" class="label">Bundler / Chain</text>

  <!-- Vertical lines -->
  <line x1="125" y1="56" x2="125" y2="460" stroke="#333" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="405" y1="56" x2="405" y2="460" stroke="#333" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="695" y1="56" x2="695" y2="460" stroke="#333" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Step 1: Verify -->
  <line x1="125" y1="90" x2="405" y2="90" class="arrow"/>
  <text x="265" y="83" text-anchor="middle" class="step">POST /wallet/verify</text>
  <text x="265" y="103" text-anchor="middle" class="detail">{ walletAddress, transactions }</text>

  <!-- Step 2: Facilitator builds UserOp -->
  <rect x="340" y="118" width="130" height="55" rx="4" fill="#111" stroke="#333" stroke-width="0.5"/>
  <text x="405" y="136" text-anchor="middle" class="detail">Build unsigned UserOp</text>
  <text x="405" y="150" text-anchor="middle" class="detail">Inject fee, sign paymaster</text>
  <text x="405" y="164" text-anchor="middle" class="detail">Compute userOpHash</text>

  <!-- Step 3: Return UserOp -->
  <line x1="405" y1="190" x2="125" y2="190" class="arrow-back"/>
  <text x="265" y="183" text-anchor="middle" class="step">{ userOp, userOpHash }</text>

  <!-- Step 4: Client signs -->
  <rect x="75" y="210" width="100" height="28" rx="4" fill="#1a1a1a" stroke="#F4B526" stroke-width="0.5"/>
  <text x="125" y="228" text-anchor="middle" class="note">Sign hash</text>

  <!-- Step 5: Settle -->
  <line x1="125" y1="260" x2="405" y2="260" class="arrow"/>
  <text x="265" y="253" text-anchor="middle" class="step">POST /wallet/settle</text>
  <text x="265" y="273" text-anchor="middle" class="detail">{ userOp, signature }</text>

  <!-- Step 6: Facilitator injects sig -->
  <rect x="340" y="290" width="130" height="28" rx="4" fill="#111" stroke="#333" stroke-width="0.5"/>
  <text x="405" y="308" text-anchor="middle" class="detail">Inject signature into UserOp</text>

  <!-- Step 7: Send to bundler -->
  <line x1="405" y1="335" x2="695" y2="335" class="arrow"/>
  <text x="550" y="328" text-anchor="middle" class="step">eth_sendUserOperation</text>

  <!-- Step 8: Receipt -->
  <line x1="695" y1="375" x2="405" y2="375" class="arrow-back"/>
  <text x="550" y="368" text-anchor="middle" class="step">{ userOpHash, txHash }</text>

  <!-- Step 9: Success -->
  <line x1="405" y1="420" x2="125" y2="420" class="arrow-back"/>
  <text x="265" y="413" text-anchor="middle" class="step">{ success, txHash }</text>
</svg>