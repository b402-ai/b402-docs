<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <style>
      text { font-family: 'Helvetica Neue', Arial, sans-serif; }
      .label { font-size: 14px; fill: #F4B526; font-weight: 600; }
      .step { font-size: 12px; fill: #fff; }
      .detail { font-size: 11px; fill: #999; }
      .arrow { stroke: #F4B526; stroke-width: 1.5; fill: none; marker-end: url(#arrowGold); }
      .arrow-back { stroke: #666; stroke-width: 1.5; fill: none; marker-end: url(#arrowGray); stroke-dasharray: 6 3; }
      .note { font-size: 11px; fill: #F4B526; font-style: italic; }
      .json { font-size: 10px; fill: #888; font-family: monospace; }
    </style>
    <marker id="arrowGold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#F4B526"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#666"/>
    </marker>
  </defs>

  <rect width="720" height="400" rx="12" fill="#0D0D0D"/>

  <!-- Column headers -->
  <rect x="100" y="20" width="100" height="36" rx="6" fill="#1a1a1a" stroke="#F4B526" stroke-width="1"/>
  <text x="150" y="43" text-anchor="middle" class="label">Client</text>

  <rect x="480" y="20" width="100" height="36" rx="6" fill="#1a1a1a" stroke="#F4B526" stroke-width="1"/>
  <text x="530" y="43" text-anchor="middle" class="label">Server</text>

  <!-- Vertical lines -->
  <line x1="150" y1="56" x2="150" y2="380" stroke="#333" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="530" y1="56" x2="530" y2="380" stroke="#333" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Step 1: Initial request -->
  <line x1="150" y1="85" x2="530" y2="85" class="arrow"/>
  <text x="340" y="78" text-anchor="middle" class="step">GET /api/premium-data</text>

  <!-- Step 2: 402 response with payment requirements -->
  <line x1="530" y1="125" x2="150" y2="125" class="arrow-back"/>
  <text x="340" y="118" text-anchor="middle" class="step">402 Payment Required</text>

  <!-- Payment requirements box -->
  <rect x="175" y="140" width="290" height="80" rx="4" fill="#111" stroke="#333" stroke-width="0.5"/>
  <text x="185" y="157" class="json">paymentRequirements: {</text>
  <text x="195" y="171" class="json">network: "bsc",</text>
  <text x="195" y="185" class="json">token: "0x55d3...",  // USDT</text>
  <text x="195" y="199" class="json">amount: "1000000...", payTo: "0xABC..."</text>
  <text x="185" y="213" class="json">}</text>

  <!-- Step 3: Sign -->
  <rect x="100" y="235" width="100" height="28" rx="4" fill="#1a1a1a" stroke="#F4B526" stroke-width="0.5"/>
  <text x="150" y="254" text-anchor="middle" class="note">Sign EIP-712</text>

  <!-- Step 4: Retry with payment -->
  <line x1="150" y1="285" x2="530" y2="285" class="arrow"/>
  <text x="340" y="278" text-anchor="middle" class="step">GET /api/premium-data</text>
  <text x="340" y="295" text-anchor="middle" class="detail">X-PAYMENT: { signed payload }</text>

  <!-- Step 5: Success -->
  <line x1="530" y1="340" x2="150" y2="340" class="arrow-back"/>
  <text x="340" y="333" text-anchor="middle" class="step">200 OK + data</text>
  <text x="340" y="353" text-anchor="middle" class="detail">X-PAYMENT-RESPONSE: { txHash }</text>
</svg>