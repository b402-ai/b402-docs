<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" fill="none">
  <defs>
    <style>
      text { font-family: 'Helvetica Neue', Arial, sans-serif; }
      .label { font-size: 14px; fill: #F4B526; font-weight: 600; }
      .step { font-size: 12px; fill: #fff; }
      .num { font-size: 11px; fill: #0D0D0D; font-weight: 700; }
      .arrow { stroke: #F4B526; stroke-width: 1.5; fill: none; marker-end: url(#arrowGold); }
      .arrow-back { stroke: #666; stroke-width: 1.5; fill: none; marker-end: url(#arrowGray); stroke-dasharray: 6 3; }
    </style>
    <marker id="arrowGold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#F4B526"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#666"/>
    </marker>
  </defs>

  <rect width="780" height="420" rx="12" fill="#0D0D0D"/>

  <!-- Column headers -->
  <rect x="70" y="20" width="100" height="36" rx="6" fill="#1a1a1a" stroke="#F4B526" stroke-width="1"/>
  <text x="120" y="43" text-anchor="middle" class="label">Client</text>

  <rect x="310" y="20" width="100" height="36" rx="6" fill="#1a1a1a" stroke="#F4B526" stroke-width="1"/>
  <text x="360" y="43" text-anchor="middle" class="label">Server</text>

  <rect x="560" y="20" width="120" height="36" rx="6" fill="#1a1a1a" stroke="#F4B526" stroke-width="1"/>
  <text x="620" y="43" text-anchor="middle" class="label">Facilitator</text>

  <!-- Vertical lines -->
  <line x1="120" y1="56" x2="120" y2="400" stroke="#333" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="360" y1="56" x2="360" y2="400" stroke="#333" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="620" y1="56" x2="620" y2="400" stroke="#333" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Step numbers as gold circles -->
  <!-- 1 -->
  <circle cx="20" cy="80" r="11" fill="#F4B526"/>
  <text x="20" y="84" text-anchor="middle" class="num">1</text>
  <line x1="120" y1="80" x2="360" y2="80" class="arrow"/>
  <text x="240" y="73" text-anchor="middle" class="step">GET /resource</text>

  <!-- 2 -->
  <circle cx="20" cy="115" r="11" fill="#F4B526"/>
  <text x="20" y="119" text-anchor="middle" class="num">2</text>
  <line x1="360" y1="115" x2="120" y2="115" class="arrow-back"/>
  <text x="240" y="108" text-anchor="middle" class="step">402 + payment details</text>

  <!-- 3 -->
  <circle cx="20" cy="155" r="11" fill="#F4B526"/>
  <text x="20" y="159" text-anchor="middle" class="num">3</text>
  <rect x="75" y="142" width="90" height="26" rx="4" fill="#1a1a1a" stroke="#F4B526" stroke-width="0.5"/>
  <text x="120" y="159" text-anchor="middle" font-size="11" fill="#F4B526" font-style="italic" font-family="Helvetica Neue, Arial, sans-serif">Sign EIP-712</text>

  <!-- 4 -->
  <circle cx="20" cy="195" r="11" fill="#F4B526"/>
  <text x="20" y="199" text-anchor="middle" class="num">4</text>
  <line x1="120" y1="195" x2="360" y2="195" class="arrow"/>
  <text x="240" y="188" text-anchor="middle" class="step">GET /resource + X-PAYMENT</text>

  <!-- 5 -->
  <circle cx="20" cy="235" r="11" fill="#F4B526"/>
  <text x="20" y="239" text-anchor="middle" class="num">5</text>
  <line x1="360" y1="235" x2="620" y2="235" class="arrow"/>
  <text x="490" y="228" text-anchor="middle" class="step">POST /verify</text>

  <!-- 6 -->
  <circle cx="20" cy="270" r="11" fill="#F4B526"/>
  <text x="20" y="274" text-anchor="middle" class="num">6</text>
  <line x1="620" y1="270" x2="360" y2="270" class="arrow-back"/>
  <text x="490" y="263" text-anchor="middle" class="step">{ isValid: true }</text>

  <!-- 7 -->
  <circle cx="20" cy="305" r="11" fill="#F4B526"/>
  <text x="20" y="309" text-anchor="middle" class="num">7</text>
  <line x1="360" y1="305" x2="620" y2="305" class="arrow"/>
  <text x="490" y="298" text-anchor="middle" class="step">POST /settle</text>

  <!-- 8 -->
  <circle cx="20" cy="340" r="11" fill="#F4B526"/>
  <text x="20" y="344" text-anchor="middle" class="num">8</text>
  <line x1="620" y1="340" x2="360" y2="340" class="arrow-back"/>
  <text x="490" y="333" text-anchor="middle" class="step">{ success, txHash }</text>

  <!-- 9 -->
  <circle cx="20" cy="375" r="11" fill="#F4B526"/>
  <text x="20" y="379" text-anchor="middle" class="num">9</text>
  <line x1="360" y1="375" x2="120" y2="375" class="arrow-back"/>
  <text x="240" y="368" text-anchor="middle" class="step">200 + resource</text>
</svg>