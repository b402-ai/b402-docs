<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <style>
      text { font-family: 'Helvetica Neue', Arial, sans-serif; }
      .box-label { font-size: 13px; fill: #fff; font-weight: 600; }
      .box-sub { font-size: 10px; fill: #999; }
      .detail { font-size: 10px; fill: #888; }
      .conn { stroke: #F4B526; stroke-width: 1.5; fill: none; marker-end: url(#arrowGold); }
    </style>
    <marker id="arrowGold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#F4B526"/>
    </marker>
  </defs>

  <rect width="720" height="400" rx="12" fill="#0D0D0D"/>

  <!-- On-chain Shield Events -->
  <rect x="260" y="20" width="200" height="45" rx="8" fill="#1a1a1a" stroke="#F4B526" stroke-width="1.5"/>
  <text x="360" y="42" text-anchor="middle" class="box-label">On-chain Shield Events</text>
  <text x="360" y="56" text-anchor="middle" class="box-sub">RAILGUN privacy pool deposits</text>

  <!-- Arrow down -->
  <line x1="360" y1="65" x2="360" y2="100" class="conn"/>

  <!-- Seeder -->
  <rect x="200" y="100" width="320" height="90" rx="8" fill="#1a1a1a" stroke="#F4B526" stroke-width="1.5"/>
  <text x="360" y="124" text-anchor="middle" class="box-label">Seeder (seedChapter0)</text>
  <line x1="220" y1="135" x2="500" y2="135" stroke="#333" stroke-width="0.5"/>
  <text x="230" y="152" class="detail">Read shields since last sync</text>
  <text x="230" y="166" class="detail">Filter for USDT / USDC / USD1</text>
  <text x="230" y="180" class="detail">Aggregate by (wallet, day) &amp; convert wei → USD</text>

  <!-- Arrow down splits -->
  <line x1="280" y1="190" x2="180" y2="240" class="conn"/>
  <line x1="440" y1="190" x2="540" y2="240" class="conn"/>

  <!-- WalletDailyDeposits -->
  <rect x="60" y="240" width="240" height="55" rx="8" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="180" y="265" text-anchor="middle" class="box-label" fill="#999">WalletDailyDeposits</text>
  <text x="180" y="282" text-anchor="middle" class="box-sub">Per-wallet, per-day totals</text>

  <!-- GlobalDailyTotals -->
  <rect x="420" y="240" width="240" height="55" rx="8" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="540" y="265" text-anchor="middle" class="box-label" fill="#999">GlobalDailyTotals</text>
  <text x="540" y="282" text-anchor="middle" class="box-sub">Protocol-wide, per-day totals</text>

  <!-- Arrows converge -->
  <line x1="180" y1="295" x2="310" y2="340" class="conn"/>
  <line x1="540" y1="295" x2="410" y2="340" class="conn"/>

  <!-- Stats API -->
  <rect x="260" y="335" width="200" height="45" rx="8" fill="#1a1a1a" stroke="#F4B526" stroke-width="1.5"/>
  <text x="360" y="355" text-anchor="middle" class="box-label">Stats API</text>
  <text x="360" y="370" text-anchor="middle" class="box-sub">Calculates points on the fly</text>
</svg>